name: terraform

on:
  workflow_run:
    workflows: ["docker-image"]
    types:
      - completed

  pull_request:
    branches: [ develop, main ]
    paths:
      - config/terraform/**

  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init
        run: terraform -chdir=./config/terraform init

      - name: Apply changes
        env:
          TF_VAR_namespace: ${{ vars.DOCKERHUB_USERNAME }}
          TF_VAR_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
        run: terraform -chdir=./config/terraform apply -auto-approve

      - name: Upload Terraform state as artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: ./config/terraform/terraform.tfstate
