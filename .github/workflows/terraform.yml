name: terraform

on:
  workflow_run:
    workflows: ["docker-image"]
    types:
      - completed

  push:
    branches:
      - develop
    paths:
      - config/terraform/**

  workflow_dispatch:

jobs:
  terraform:
    runs-on: aws-runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Init
        run: terraform -chdir=./config/terraform init

      - name: Apply changes
        env:
          TF_VAR_namespace: ${{ vars.DOCKERHUB_USERNAME }}
        run: terraform -chdir=./config/terraform apply -auto-approve
