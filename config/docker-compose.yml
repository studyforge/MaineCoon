name: mainecoon

services:

    postgres:
        container_name: postgres
        image: postgres:17
        volumes:
            - db:/var/lib/postgresql/data
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: app
        ports:
            - 5432:5432
        network_mode: host

    mainecoon-api:
        depends_on: 
            postgres:
                condition: service_started
        restart: unless-stopped
        build:
            context: ../api
            dockerfile: Dockerfile
            target: base
        volumes:
            - ../api:/app
        ports:
            - 3333:3333
        env_file:
            - .env.development.local
        network_mode: host
        command: sh -c "npm install && node ace migration:run --force && node ace serve --watch --poll 1"

    mainecoon-client:
        depends_on:
            mainecoon-api:
                condition: service_started
        build:
            context: ../ui
            dockerfile: Dockerfile
            target: base
        volumes:
            - ../ui:/app
        ports:
            - 3334:3334
        env_file:
            - .env.development.local
        network_mode: host
        command: sh -c "npm install && npm run dev"

volumes:
    db:
        driver: local

            