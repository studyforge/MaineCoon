name: maincoon

services:

  nginx:
    image: nginx:latest
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - maincoon

  maincoon-client:
    build:
      context: ../ui
      dockerfile: Dockerfile
    networks:
      - maincoon

  maincoon-api:
    restart: unless-stopped
    build:
      context: ../api
      dockerfile: Dockerfile
    depends_on: maincoon-client
    ports:
      - 3333:3333
    env_file:
      - ../api/.env
    networks:
      - maincoon

secrets:
  admin_password:
    file: admin_password

networks:
  maincoon: